set -g default-terminal "tmux-256color"
set -as terminal-features ",wezterm:RGB,xterm-256color:RGB"

set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g history-limit 50000
set -g escape-time 10
unbind-key C-b
set -g prefix C-a
bind-key C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename off
set -g allow-rename off
setw -g monitor-activity on
set -g visual-activity off

set -g status on
set -g status-position bottom
set -g status-interval 2
set -g status-left-length 32
set -g status-right-length 96
set -g status-style 'bg=#0b1020,fg=#aab2c8'
set -g status-left '#[bold,fg=#7dd3fc,bg=#0b1020]#S#[default] '
# @llm_fleet is a compact roll-up of agent states across all windows (working /
# present / waiting), published by the tmux-llm-status daemon. Shown only when set.
set -g status-right '#[fg=#c4b5fd,bg=#0b1020]#{?#{@llm_fleet},#{@llm_fleet}  ,}#[fg=#8ea0bc,bg=#0b1020]%Y-%m-%d #[fg=#9ccfd8,bg=#0b1020]%H:%M '

set -g window-status-separator ' '
set -g window-status-style 'fg=#8ea0bc,bg=#0b1020'
set -g window-status-current-style 'bold,fg=#dbeafe,bg=#1e3a5f'
set -g window-status-format '#[fg=#8ea0bc,bg=#0b1020]#{?#{@llm_status},#{@llm_status} ,#{?window_activity_flag,● ,}}#I:#W'
set -g window-status-current-format '#[bold,fg=#dbeafe,bg=#1e3a5f]#{?#{@llm_status},#{@llm_status} ,}#I:#W '
set -g window-status-activity-style 'fg=#8bd5ca,bg=#0b1020,bold'
set -g window-status-bell-style 'fg=#fecaca,bg=#7f1d1d,bold'
set -g mode-style 'bold,fg=#dbeafe,bg=#1e3a5f'
set -g message-style 'fg=#dbeafe,bg=#1e3a5f'
set -g message-command-style 'fg=#dbeafe,bg=#1e3a5f'
run-shell -b '~/.local/bin/tmux-llm-status restart'

# Pane borders. fg-only (no bg) so the terminal's background transparency lets the
# wallpaper show through the divider cell; the active pane gets a brighter accent.
# indicators=off disables tmux's two-pane special case, where 'colour' mode fills
# only half the divider as a directional hint - with it off, a 2-pane split gets a
# full-height active border like windows with 3+ panes already do.
set -g pane-border-style 'fg=#565f89'
set -g pane-active-border-style 'fg=#7aa2f7'
set -g pane-border-indicators off

bind-key c new-window -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '\' split-window -h -c "#{pane_current_path}"
bind-key '-' split-window -v -c "#{pane_current_path}"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
# Jump to the next agent that is present but not working - i.e. waiting on you.
bind-key a run-shell '~/.local/bin/tmux-llm-status next-waiting'
bind-key r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# A tmux server is long-lived and keeps its options until re-sourced, so edits
# to this file don't reach a running server on their own. Re-source on client
# attach so a newly opened WezTerm window always picks up the latest config.
# (An already-attached session still needs `Ctrl-a r`.) Comment out to opt out.
set-hook -g client-attached 'source-file ~/.tmux.conf'

if-shell '[ -f ~/.tmux.local.conf ]' 'source-file ~/.tmux.local.conf'
